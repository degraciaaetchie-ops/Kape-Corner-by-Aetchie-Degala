<!DOCTYPE html>
<html>
<head>
    <title>Kape Corner - Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2b1d16;
            color: #f5f5f5;
            text-align: center;
        }

        .title {
            font-size: 60px;
            font-weight: bold;
            margin-top: 120px;
        }

        input {
            padding: 10px;
            width: 220px;
            border: none;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #8b5e3c;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #a06b45;
        }

        a {
            color: #f5f5f5;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="title">Kape Corner</div>

    <h2>Login</h2>

    <!-- SIMPLE LOGIN (NO DATABASE) -->
    <form action="home finals.html">
        <input type="text" placeholder="Username" required><br><br>
        <input type="password" placeholder="Password" required><br><br>

        <input type="submit" value="Login">
    </form>

    <p>Don't have an account? <a href="register page.html">Register here</a></p>

</body>
</html>
