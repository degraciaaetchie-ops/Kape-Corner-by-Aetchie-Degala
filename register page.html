<!DOCTYPE html>
<html>
<head>
    <title>Kape Corner - Register</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2b1d16;
            color: #f5f5f5;
            text-align: center;
        }

        .title {
            font-size: 60px;
            font-weight: bold;
            margin-top: 80px;
        }

        input {
            padding: 10px;
            width: 220px;
            border: none;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #8b5e3c;
            color: white;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #a06b45;
        }

        a {
            color: #f5f5f5;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="title">Kape Corner</div>

    <h2>Register</h2>

    <!-- REGISTER FORM -->
    <form action="finals index.html">
        <input type="text" placeholder="Full Name" required><br><br>
        <input type="email" placeholder="Email" required><br><br>
        <input type="text" placeholder="Username" required><br><br>
        <input type="password" placeholder="Password" required><br><br>

        <input type="submit" value="Register">
    </form>

    <p>Already have an account? <a href="index.html">Login here</a></p>

</body>
</html>
